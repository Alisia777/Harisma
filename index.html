<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Дом бренда Алтея · v8.7.1 Imperial</title>
  <meta name="description" content="Дом бренда Алтея: оперативный контур бренда, площадок, рекламы и решений в одном экране.">
  <link rel="icon" href="assets/altea-imperial-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=20260419q1">
  <link rel="stylesheet" href="imperial.css?v=20260419q1">
  <link rel="stylesheet" href="v87.css?v=20260419q1">
</head>
<body class="v87-imperial">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="logo-badge logo-badge-mark">
          <img src="assets/altea-imperial-mark.svg" alt="Altea mark">
        </div>
        <div>
          <div class="brand-title">Дом бренда Алтея</div>
          <div class="brand-sub">Рабочий контур бренда и решений.</div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">
          <span>Дашборд</span>
          <small>Пульс · лидеры · сигналы</small>
        </button>
        <button class="nav-btn" data-view="documents">
          <span>Документы</span>
          <small>Регламенты · ссылки</small>
        </button>
        <button class="nav-btn" data-view="repricer">
          <span>Репрайсер</span>
          <small>Цена · риски · рекомендации</small>
        </button>
        <button class="nav-btn" data-view="prices">
          <span>Цены</span>
          <small>Маржа · оборот · СПП</small>
        </button>
        <button class="nav-btn" data-view="order">
          <span>Заказ товара</span>
          <small>Кластеры · склады · поставки</small>
        </button>
        <button class="nav-btn" data-view="control">
          <span>Задачи</span>
          <small>Задачи · РОП · контроль</small>
        </button>
        <button class="nav-btn" data-view="skus">
          <span>Реестр SKU</span>
          <small>SKU · карточки · owner</small>
        </button>
        <button class="nav-btn" data-view="launches">
          <span>Продукт / Ксения</span>
          <small>Товар · новинки · экономика</small>
        </button>
        <button class="nav-btn" data-view="launch-control">
          <span>Запуск новинок</span>
          <small>Чек-листы · фазы · просрочки</small>
        </button>
        <button class="nav-btn" data-view="meetings">
          <span>Ритм работы</span>
          <small>Weekly / Monthly / PMR</small>
        </button>
        <button class="nav-btn" data-view="executive">
          <span>Руководителю</span>
          <small>Риски · решения · итог</small>
        </button>
      </nav>

    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1>Дом бренда Алтея</h1>
          <p>Истина в том, что правых нет. Есть лишь те, кто выдержал цену решений и не потерял курс во тьме.</p>
        </div>
        <div class="top-actions top-actions-wrap">
          <div class="sync-status pending" id="syncStatusBadge">Подключаем командную базу…</div>
          <button class="btn ghost" id="pullRemoteBtn" type="button">Обновить командные данные</button>
          <button class="btn ghost" id="pushRemoteBtn" type="button">Синхронизировать изменения</button>
          <button class="btn ghost hidden" id="toggleAdminBarBtn" type="button">Админ</button>
          <button class="btn" id="exportStorageBtn">Экспорт рабочего JSON</button>
          <label class="btn file-input">Импорт JSON
            <input type="file" id="importStorageInput" accept="application/json">
          </label>
        </div>
      </div>

      <div class="banner hidden" id="appError"></div>

      <section class="view active" id="view-dashboard"></section>
      <section class="view" id="view-documents"></section>
      <section class="view" id="view-repricer"></section>
      <section class="view" id="view-prices"></section>
      <section class="view" id="view-order"></section>
      <section class="view" id="view-control"></section>
      <section class="view" id="view-skus"></section>
      <section class="view" id="view-launches"></section>
      <section class="view" id="view-launch-control"></section>
      <section class="view" id="view-meetings"></section>
      <section class="view" id="view-executive"></section>
    </main>
  </div>

  <div class="modal" id="skuModal">
    <div class="modal-card" id="skuModalBody"></div>
  </div>

  <script>
    window.__ALTEA_BOOT = { configLoaded: true, supabaseLoaded: false };
    (function(){
      document.body.classList.add('v87-imperial');
      const setBadge=(txt, cls)=>{ const el=document.getElementById('syncStatusBadge'); if(!el) return; el.className='sync-status'; if(cls) el.classList.add(cls); el.textContent=txt; };
      window.__alteaSetBootBadge=setBadge;
      setBadge('Подключаем командную базу…','pending');
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onload="window.__ALTEA_BOOT.supabaseLoaded=true; window.__alteaSetBootBadge && window.__alteaSetBootBadge('Подключаем командную базу…','pending');"></script>
  <script src="app.min.js?v=20260420b"></script>
  <script src="portal-hotfix.js?v=20260417c"></script>
  <script src="portal-ui-hotfix.js?v=20260417d"></script>
  <script src="portal-livefix.js?v=20260417g"></script>
  <script src="portal-team-runtime-hotfix.js?v=20260417k"></script>
  <script src="portal-supabase-snapshot-hotfix.min.js?v=20260419r2"></script>
  <script src="portal-team-reconnect-hotfix.js?v=20260417i"></script>
  <script src="task-center-hotfix.js?v=20260417f"></script>
  <script src="task-center-queues-hotfix.js?v=20260417f"></script>
  <script src="portal-dashboard-interactive-hotfix.min.js?v=20260420a"></script>
  <script src="portal-price-workbench-hotfix.min.js?v=20260419r4"></script>
</body>
</html>
