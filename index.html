  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onload="window.__ALTEA_BOOT.supabaseLoaded=true; window.__alteaSetBootBadge && window.__alteaSetBootBadge('Подключаем командную базу…','pending');"></script>
  <script>
    (function () {
      if (window.__ALTEA_RESPONSE_JSON_GUARD__) return;
      window.__ALTEA_RESPONSE_JSON_GUARD__ = true;

      const originalJson = Response.prototype.json;
      const replacements = [
        ['-Infinity', 'null'],
        ['Infinity', 'null'],
        ['NaN', 'null'],
        ['undefined', 'null']
      ];

      function isBoundary(char) {
        return char === undefined || /[\s,\]\[}{:]/.test(char);
      }

      function sanitizeLooseJson(text) {
        if (!text || typeof text !== 'string') return text;
        let result = '';
        let inString = false;
        let escaped = false;

        for (let i = 0; i < text.length; i += 1) {
          const char = text[i];
          if (inString) {
            result += char;
            if (escaped) escaped = false;
            else if (char === '\\') escaped = true;
            else if (char === '"') inString = false;
            continue;
          }
          if (char === '"') {
            inString = true;
            result += char;
            continue;
          }
          let matched = false;
          for (const [token, replacement] of replacements) {
            if (text.startsWith(token, i) && isBoundary(text[i - 1]) && isBoundary(text[i + token.length])) {
              result += replacement;
              i += token.length - 1;
              matched = true;
              break;
            }
          }
          if (!matched) result += char;
        }

        return result;
      }

      Response.prototype.json = async function patchedResponseJson() {
        const backup = this.clone();
        try {
          return await originalJson.call(this);
        } catch (error) {
          const text = await backup.text();
          const sanitized = sanitizeLooseJson(text);
          if (sanitized === text) throw error;
          return JSON.parse(sanitized);
        }
      };
    })();
  </script>
